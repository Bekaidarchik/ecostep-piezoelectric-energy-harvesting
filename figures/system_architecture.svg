<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="430" viewBox="0 0 1060 430">
  <rect width="1060" height="430" fill="#ffffff"/>
  <text x="44" y="54" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111111">EcoStep system architecture</text>
  <text x="44" y="86" font-family="Arial, sans-serif" font-size="15" fill="#333333">Measurement-first architecture with a separate optional demonstration module.</text>

  <g font-family="Arial, sans-serif" fill="#111111">
    <rect x="44" y="150" width="130" height="78" rx="6" fill="#ffffff" stroke="#111111" stroke-width="2"/>
    <text x="109" y="181" font-size="15" font-weight="700" text-anchor="middle">Footstep</text>
    <text x="109" y="203" font-size="14" text-anchor="middle">force input</text>

    <rect x="220" y="150" width="150" height="78" rx="6" fill="#ffffff" stroke="#111111" stroke-width="2"/>
    <text x="295" y="181" font-size="15" font-weight="700" text-anchor="middle">Layered tile</text>
    <text x="295" y="203" font-size="14" text-anchor="middle">compression</text>

    <rect x="416" y="150" width="150" height="78" rx="6" fill="#ffffff" stroke="#111111" stroke-width="2"/>
    <text x="491" y="181" font-size="15" font-weight="700" text-anchor="middle">16 PZT array</text>
    <text x="491" y="203" font-size="14" text-anchor="middle">4 x 4 elements</text>

    <rect x="612" y="88" width="160" height="78" rx="6" fill="#ffffff" stroke="#111111" stroke-width="2"/>
    <text x="692" y="119" font-size="15" font-weight="700" text-anchor="middle">Conditioning</text>
    <text x="692" y="141" font-size="14" text-anchor="middle">rectifier / capacitor</text>

    <rect x="612" y="212" width="160" height="78" rx="6" fill="#ffffff" stroke="#111111" stroke-width="2"/>
    <text x="692" y="243" font-size="15" font-weight="700" text-anchor="middle">Known load</text>
    <text x="692" y="265" font-size="14" text-anchor="middle">resistor test</text>

    <rect x="820" y="88" width="172" height="78" rx="6" fill="#ffffff" stroke="#111111" stroke-width="2"/>
    <text x="906" y="119" font-size="15" font-weight="700" text-anchor="middle">Measurement</text>
    <text x="906" y="141" font-size="14" text-anchor="middle">Arduino / multimeter</text>

    <rect x="820" y="212" width="172" height="78" rx="6" fill="#ffffff" stroke="#111111" stroke-width="2"/>
    <text x="906" y="243" font-size="15" font-weight="700" text-anchor="middle">Python analysis</text>
    <text x="906" y="265" font-size="14" text-anchor="middle">energy estimates</text>

    <rect x="612" y="328" width="380" height="54" rx="6" fill="#f7f7f7" stroke="#111111" stroke-width="2"/>
    <text x="802" y="350" font-size="15" font-weight="700" text-anchor="middle">Optional demo electronics</text>
    <text x="802" y="370" font-size="13" text-anchor="middle">display / LED / battery holder documented separately until verified</text>
  </g>

  <g stroke="#111111" stroke-width="2" fill="none">
    <line x1="174" y1="189" x2="220" y2="189"/>
    <line x1="370" y1="189" x2="416" y2="189"/>
    <line x1="566" y1="170" x2="612" y2="128"/>
    <line x1="566" y1="207" x2="612" y2="252"/>
    <line x1="772" y1="127" x2="820" y2="127"/>
    <line x1="772" y1="251" x2="820" y2="251"/>
    <line x1="906" y1="166" x2="906" y2="212"/>
    <line x1="566" y1="228" x2="612" y2="355" stroke-dasharray="6 5"/>
  </g>
  <g fill="#111111">
    <polygon points="220,189 206,181 206,197"/>
    <polygon points="416,189 402,181 402,197"/>
    <polygon points="612,128 596,130 608,143"/>
    <polygon points="612,252 596,249 608,237"/>
    <polygon points="820,127 806,119 806,135"/>
    <polygon points="820,251 806,243 806,259"/>
    <polygon points="906,212 898,198 914,198"/>
    <polygon points="612,355 599,344 616,340"/>
  </g>

  <text x="44" y="400" font-family="Arial, sans-serif" font-size="14" fill="#444444">Dashed path means optional demonstration only; it is not claimed as harvested-energy powered until measured.</text>
</svg>
